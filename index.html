<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>롤 챔피언 추천기</title>
    <style>
      :root {
        --bg1: #09090b;
        --bg2: #18181b;
        --card: rgba(39, 39, 42, 0.6);
        --line: rgba(63, 63, 70, 0.5);
        --text: #f4f4f5;
        --muted: #a1a1aa;
        --accent: #c2902d; /* LoL Gold */
        --accent2: #006680; /* LoL Blue */
        --danger: #ef4444;
        --shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        --btn-ghost: rgba(39, 39, 42, 0.8);
        --btn-ghost-border: rgba(63, 63, 70, 0.5);
        --stat-bg: rgba(24, 24, 27, 0.8);
        --stat-border: rgba(63, 63, 70, 0.4);
      }

      body.light-mode {
        --bg1: #f8fafc;
        --bg2: #f1f5f9;
        --card: #ffffff;
        --line: #e2e8f0;
        --text: #1e293b;
        --muted: #64748b;
        --accent: #b28522;
        --accent2: #0284c7;
        --danger: #dc2626;
        --shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        --btn-ghost: #f1f5f9;
        --btn-ghost-border: #e2e8f0;
        --stat-bg: #f8fafc;
        --stat-border: #e2e8f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: 'Pretendard', sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(194, 144, 45, 0.1), transparent 30%),
          radial-gradient(circle at top right, rgba(0, 102, 128, 0.1), transparent 30%),
          linear-gradient(135deg, var(--bg1), var(--bg2));
        min-height: 100vh;
        padding: 24px;
        transition: background 0.3s ease, color 0.3s ease;
      }

      .theme-toggle {
        position: absolute;
        top: 20px;
        right: 20px;
        z-index: 100;
      }

      .theme-toggle button {
        background: var(--card);
        border: 1px solid var(--line);
        color: var(--text);
        padding: 8px 16px;
        border-radius: 12px;
        cursor: pointer;
        font-size: 0.9rem;
        font-weight: 600;
        box-shadow: var(--shadow);
        transition: all 0.2s ease;
      }

      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        position: relative;
      }

      .hero {
        text-align: center;
        margin-bottom: 40px;
        margin-top: 40px;
      }

      .hero h1 {
        margin: 0 0 10px;
        font-size: clamp(2rem, 4vw, 3.2rem);
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 2px;
      }

      .hero p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .lane-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 16px;
        margin-bottom: 30px;
      }

      .lane-card {
        background: var(--card);
        border: 2px solid var(--line);
        border-radius: 20px;
        padding: 24px 16px;
        text-align: center;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
      }

      .lane-card:hover {
        border-color: var(--accent);
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(194, 144, 45, 0.15);
      }

      .lane-icon {
        font-size: 1.5rem;
        font-weight: 800;
        color: var(--accent);
        margin-bottom: 12px;
        display: block;
      }

      .lane-name {
        font-size: 0.9rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 15px;
        display: block;
      }

      .champ-name {
        font-size: 1.4rem;
        font-weight: 800;
        min-height: 1.4rem;
        color: var(--text);
        transition: transform 0.3s ease;
      }

      .champ-name.rolling {
        filter: blur(4px);
        transform: scale(0.9);
      }

      .panel {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 30px;
        margin-bottom: 24px;
        text-align: center;
      }

      .controls {
        display: flex;
        justify-content: center;
        gap: 16px;
        margin-top: 20px;
      }

      button {
        border: 0;
        cursor: pointer;
        border-radius: 14px;
        padding: 16px 32px;
        font-size: 1.1rem;
        font-weight: 700;
        transition: all 0.2s ease;
      }

      .primary {
        background: linear-gradient(135deg, var(--accent), #8a661b);
        color: white;
        box-shadow: 0 10px 24px rgba(194, 144, 45, 0.3);
      }

      .primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 30px rgba(194, 144, 45, 0.4);
      }

      .ghost {
        background: var(--btn-ghost);
        color: var(--text);
        border: 1px solid var(--btn-ghost-border);
      }

      .contact-section {
        text-align: left;
      }

      .contact-form {
        display: grid;
        gap: 16px;
        margin-top: 20px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .form-group label {
        font-size: 0.9rem;
        color: var(--muted);
      }

      .form-group input, .form-group textarea {
        background: var(--stat-bg);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
        color: var(--text);
        font-family: inherit;
      }

      .footer {
        text-align: center;
        color: var(--muted);
        margin-top: 40px;
        font-size: 0.9rem;
      }

      @media (max-width: 600px) {
        .lane-grid {
          grid-template-columns: 1fr 1fr;
        }
        .lane-grid > div:last-child {
          grid-column: span 2;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="theme-toggle">
        <button id="themeBtn">☀️ 라이트 모드</button>
      </div>

      <div class="hero">
        <h1>⚔️ LoL Champion Picker</h1>
        <p>오늘 뭐 할지 고민인가요? 라인별로 랜덤 챔피언을 골라드립니다.</p>
      </div>

      <div class="lane-grid">
        <div class="lane-card">
          <span class="lane-icon">🏔️</span>
          <span class="lane-name">TOP</span>
          <div class="champ-name" id="topChamp">?</div>
        </div>
        <div class="lane-card">
          <span class="lane-icon">🌳</span>
          <span class="lane-name">JUNGLE</span>
          <div class="champ-name" id="jungleChamp">?</div>
        </div>
        <div class="lane-card">
          <span class="lane-icon">🪄</span>
          <span class="lane-name">MID</span>
          <div class="champ-name" id="midChamp">?</div>
        </div>
        <div class="lane-card">
          <span class="lane-icon">🏹</span>
          <span class="lane-name">ADC</span>
          <div class="champ-name" id="adcChamp">?</div>
        </div>
        <div class="lane-card">
          <span class="lane-icon">🛡️</span>
          <span class="lane-name">SUPPORT</span>
          <div class="champ-name" id="supportChamp">?</div>
        </div>
      </div>

      <div class="panel">
        <div class="controls">
          <button class="primary" id="rerollBtn">🔥 리롤 (Reroll)</button>
          <button class="ghost" id="copyBtn">📋 조합 복사</button>
          <button class="ghost" id="toggleContactBtn">🤝 제휴 문의</button>
        </div>
        <p style="margin-top: 20px; color: var(--muted); font-size: 0.9rem;" id="statusMsg">
          리롤 버튼을 눌러 소환사의 협곡으로 떠나세요!
        </p>
      </div>

      <section class="panel contact-section" id="contactPanel" style="display: none;">
        <div class="section-title">
          <h2>🤝 제휴 및 서비스 문의</h2>
        </div>
        <form action="https://formspree.io/f/mdapaqyw" method="POST" class="contact-form">
          <div class="form-group">
            <label for="name">성함/기업명</label>
            <input type="text" id="name" name="name" placeholder="성함 또는 기업명을 입력해주세요" required>
          </div>
          <div class="form-group">
            <label for="email">이메일 주소</label>
            <input type="email" id="email" name="_replyto" placeholder="답변받으실 이메일을 입력해주세요" required>
          </div>
          <div class="form-group">
            <label for="message">문의 내용</label>
            <textarea id="message" name="message" rows="4" placeholder="문의하실 내용을 상세히 적어주세요" required></textarea>
          </div>
          <button type="submit" class="primary" style="width: 100%">문의 보내기</button>
        </form>
      </section>

      <!-- Disqus Comments -->
      <section class="panel" style="text-align: left; margin-top: 24px;">
        <div class="section-title">
          <h2>💬 커뮤니티</h2>
        </div>
        <div id="disqus_thread"></div>
        <script>
            /**
            *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
            *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
            /*
            var disqus_config = function () {
            this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
            this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
            };
            */
            (function() { // DON'T EDIT BELOW THIS LINE
            var d = document, s = d.createElement('script');
            s.src = 'https://producttest-1.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
      </section>

      <div class="footer">
        ✨ 리그 오브 레전드 챔피언 추천 서비스입니다.
      </div>
    </div>

    <script>
      const THEME_KEY = 'lol_theme_v1'
      const themeBtn = document.getElementById('themeBtn')
      const rerollBtn = document.getElementById('rerollBtn')
      const copyBtn = document.getElementById('copyBtn')
      const toggleContactBtn = document.getElementById('toggleContactBtn')
      const contactPanel = document.getElementById('contactPanel')
      const statusMsg = document.getElementById('statusMsg')

      // Contact Form Toggle
      toggleContactBtn.addEventListener('click', () => {
        const isHidden = contactPanel.style.display === 'none'
        contactPanel.style.display = isHidden ? 'block' : 'none'
        toggleContactBtn.textContent = isHidden ? '❌ 문의 닫기' : '🤝 제휴 문의'
        if (isHidden) {
          contactPanel.scrollIntoView({ behavior: 'smooth' })
        }
      })

      const champions = {
        TOP: ['가렌', '다리우스', '잭스', '피오라', '카밀', '레넥톤', '아트록스', '오른', '말파이트', '제이스', '갱플랭크', '나르', '퀸', '티모'],
        JUNGLE: ['리 신', '자르반 4세', '카직스', '바이브', '니달리', '엘리스', '세주아니', '잭', '그레이브즈', '킨드레드', '에코', '샤코', '녹턴'],
        MID: ['아리', '야스오', '요네', '제드', '신드라', '오리아나', '빅토르', '르블랑', '카타리나', '아지르', '벡스', '조이', '탈론', '럭스'],
        ADC: ['이즈리얼', '카이사', '베인', '징크스', '루시안', '애쉬', '케이틀린', '사미라', '드레이븐', '바루스', '닐라', '트리스타나', '자야'],
        SUPPORT: ['쓰레쉬', '레오나', '노틸러스', '룰루', '잔나', '소라카', '파이크', '세나', '바드', '라칸', '블리츠크랭크', '유미', '나미']
      }

      // Theme Management
      let isLightMode = localStorage.getItem(THEME_KEY) === 'light'
      if (isLightMode) {
        document.body.classList.add('light-mode')
        themeBtn.textContent = '🌙 다크 모드'
      }

      themeBtn.addEventListener('click', () => {
        isLightMode = !isLightMode
        document.body.classList.toggle('light-mode', isLightMode)
        localStorage.setItem(THEME_KEY, isLightMode ? 'light' : 'dark')
        themeBtn.textContent = isLightMode ? '🌙 다크 모드' : '☀️ 라이트 모드'
      })

      async function reroll() {
        rerollBtn.disabled = true
        statusMsg.textContent = '운명의 챔피언을 찾는 중...'
        
        const lanes = ['top', 'jungle', 'mid', 'adc', 'support']
        
        // Rolling effect
        for (let i = 0; i < 10; i++) {
          lanes.forEach(lane => {
            const el = document.getElementById(`${lane}Champ`)
            const list = champions[lane.toUpperCase()]
            el.textContent = list[Math.floor(Math.random() * list.length)]
            el.classList.add('rolling')
          })
          await new Promise(r => setTimeout(r, 80))
        }

        // Final selection
        lanes.forEach(lane => {
          const el = document.getElementById(`${lane}Champ`)
          const list = champions[lane.toUpperCase()]
          el.textContent = list[Math.floor(Math.random() * list.length)]
          el.classList.remove('rolling')
        })

        statusMsg.textContent = '챔피언 선택 완료! 전장으로 나가세요.'
        rerollBtn.disabled = false
      }

      async function copyCombination() {
        const top = document.getElementById('topChamp').textContent
        const jungle = document.getElementById('jungleChamp').textContent
        const mid = document.getElementById('midChamp').textContent
        const adc = document.getElementById('adcChamp').textContent
        const support = document.getElementById('supportChamp').textContent
        
        if (top === '?') {
          alert('먼저 리롤을 눌러주세요!')
          return
        }

        const text = `🎮 오늘의 롤 조합:\nTOP: ${top}\nJUNGLE: ${jungle}\nMID: ${mid}\nADC: ${adc}\nSUP: ${support}`
        
        try {
          await navigator.clipboard.writeText(text)
          alert('조합이 복사되었습니다!')
        } catch (err) {
          alert('복사에 실패했습니다.')
        }
      }

      rerollBtn.addEventListener('click', reroll)
      copyBtn.addEventListener('click', copyCombination)
    </script>
  </body>
</html>
