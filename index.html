<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>롤 챔피언 추천기</title>
    <!-- CSS 연결 -->
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="wrap">
      <div class="theme-toggle">
        <button id="themeBtn">☀️ 라이트 모드</button>
      </div>

      <div class="hero">
        <h1>⚔️ LoL Champion Picker</h1>
        <p>오늘 뭐 할지 고민인가요? 라인별로 랜덤 챔피언을 골라드립니다.</p>
      </div>

      <div class="lane-grid">
        <div class="lane-card">
          <span class="lane-icon">🏔️</span>
          <span class="lane-name">TOP</span>
          <div class="champ-name" id="topChamp">?</div>
        </div>
        <div class="lane-card">
          <span class="lane-icon">🌳</span>
          <span class="lane-name">JUNGLE</span>
          <div class="champ-name" id="jungleChamp">?</div>
        </div>
        <div class="lane-card">
          <span class="lane-icon">🪄</span>
          <span class="lane-name">MID</span>
          <div class="champ-name" id="midChamp">?</div>
        </div>
        <div class="lane-card">
          <span class="lane-icon">🏹</span>
          <span class="lane-name">ADC</span>
          <div class="champ-name" id="adcChamp">?</div>
        </div>
        <div class="lane-card">
          <span class="lane-icon">🛡️</span>
          <span class="lane-name">SUPPORT</span>
          <div class="champ-name" id="supportChamp">?</div>
        </div>
      </div>

      <div class="panel">
        <div class="controls">
          <button class="primary" id="rerollBtn">🔥 리롤 (Reroll)</button>
          <button class="ghost" id="copyBtn">📋 조합 복사</button>
          <button class="ghost" id="toggleContactBtn">🤝 제휴 문의</button>
          <button class="ghost" id="toggleCommunityBtn">💬 커뮤니티</button>
        </div>
        <p style="margin-top: 20px; color: var(--muted); font-size: 0.9rem;" id="statusMsg">
          리롤 버튼을 눌러 소환사의 협곡으로 떠나세요!
        </p>
      </div>

      <section class="panel contact-section" id="contactPanel" style="display: none;">
        <div class="section-title">
          <h2>🤝 제휴 및 서비스 문의</h2>
        </div>
        <form action="https://formspree.io/f/mdapaqyw" method="POST" class="contact-form">
          <div class="form-group">
            <label for="name">성함/기업명</label>
            <input type="text" id="name" name="name" placeholder="성함 또는 기업명을 입력해주세요" required>
          </div>
          <div class="form-group">
            <label for="email">이메일 주소</label>
            <input type="email" id="email" name="_replyto" placeholder="답변받으실 이메일을 입력해주세요" required>
          </div>
          <div class="form-group">
            <label for="message">문의 내용</label>
            <textarea id="message" name="message" rows="4" placeholder="문의하실 내용을 상세히 적어주세요" required></textarea>
          </div>
          <button type="submit" class="primary" style="width: 100%">문의 보내기</button>
        </form>
      </section>

      <!-- Disqus Comments -->
      <section class="panel" id="communityPanel" style="text-align: left; margin-top: 24px; display: none;">
        <div class="section-title">
          <h2>💬 커뮤니티</h2>
        </div>
        <div id="disqus_thread"></div>
        <script>
            (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://producttest-1.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the comments.</noscript>
      </section>

      <div class="footer">
        ✨ 리그 오브 레전드 챔피언 추천 서비스입니다.
      </div>
    </div>

    <!-- JS 연결 -->
    <script src="script.js"></script>
  </body>
</html>
